<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="wc" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="4" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="120" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="gold" cx="72%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#c79a54" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#d8b878" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#efe7d5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blue" cx="20%" cy="82%" r="62%">
      <stop offset="0%" stop-color="#3f5f86" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#7d9cc0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c9d6e6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1200" fill="#f4efe2"/>
  <g filter="url(#wc)">
    <rect width="900" height="1200" fill="url(#gold)"/>
    <rect width="900" height="1200" fill="url(#blue)"/>
    <ellipse cx="230" cy="920" rx="360" ry="300" fill="#4a6a92" opacity="0.35"/>
    <ellipse cx="150" cy="1020" rx="220" ry="200" fill="#33507a" opacity="0.4"/>
    <ellipse cx="700" cy="230" rx="320" ry="240" fill="#c99b50" opacity="0.3"/>
  </g>
  <rect width="900" height="1200" filter="url(#grain)" opacity="0.6"/>
</svg>
